services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: antflow_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./.antflow/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - antflow_network

networks:
  antflow_network:
    driver: bridge

volumes:
  antflow_qdrant_storage:
    driver: local
